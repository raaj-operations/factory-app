<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factory Inventory</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
    .section { background: #f9f9f9; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    input { padding: 8px; margin: 6px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 15px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

  <h1>🏭 Factory Inventory System</h1>

  <!-- PRODUCTION -->
  <div class="section">
    <h2>⚙️ Production Entry</h2>
    <input type="text" id="prodCode" placeholder="Product Code (e.g. P001)" />
    <input type="number" id="prodQty" placeholder="Quantity" />
    <button onclick="submitEntry('production', 'prodCode', 'prodQty')">Submit Production</button>
  </div>

  <!-- RAW MATERIAL PURCHASE -->
  <div class="section">
    <h2>📦 Raw Material Purchase</h2>
    <input type="text" id="purchaseCode" placeholder="Material Code (e.g. M001)" />
    <input type="number" id="purchaseQty" placeholder="Quantity" />
    <button onclick="submitEntry('purchase', 'purchaseCode', 'purchaseQty')">Submit Purchase</button>
  </div>

  <!-- DISPATCH -->
  <div class="section">
    <h2>🚚 Dispatch Entry</h2>
    <input type="text" id="dispatchCode" placeholder="Product Code (e.g. P001)" />
    <input type="number" id="dispatchQty" placeholder="Quantity" />
    <button onclick="submitEntry('dispatch', 'dispatchCode', 'dispatchQty')">Submit Dispatch</button>
  </div>

  <script>
    // ✅ PASTE YOUR NEW APPS SCRIPT URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbwqnHC4T0QuDGtwjiuAq6PtxyP58J4Ul5j4ZvJ45_0F-zMvPtMaEMLtWYvVejxiy66G/exec";

    async function submitEntry(type, codeId, qtyId) {
      const code = document.getElementById(codeId).value.trim();
      const qty  = document.getElementById(qtyId).value.trim();

      if (!code || !qty) {
        alert("⚠️ Please enter both Code and Quantity");
        return;
      }

      const url = `${API_URL}?type=${type}&code=${encodeURIComponent(code)}&qty=${qty}`;

      try {
        await fetch(url, { method: "GET", mode: "no-cors" });
        alert("✅ Submitted successfully! Sheet will update within 1 minute.");

        // Clear inputs after submit
        document.getElementById(codeId).value = "";
        document.getElementById(qtyId).value = "";

      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    }
  </script>

</body>
</html>
